<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- KeeNet: a centered key on a blue→cyan gradient squircle. -->
  <defs>
    <linearGradient id="grad" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4a90e2"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- gradient squircle -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>

  <!-- key (white): bow + shaft + two teeth -->
  <g fill="#fff">
    <circle cx="16" cy="10.2" r="4.7"/>
    <rect x="14.7" y="13" width="2.6" height="12.6" rx="1.3"/>
    <rect x="17.3" y="20.4" width="2.9" height="1.9" rx="0.5"/>
    <rect x="17.3" y="23.3" width="1.9" height="1.9" rx="0.5"/>
  </g>

  <!-- bow hole punched through to the gradient (same userSpaceOnUse gradient = seamless) -->
  <circle cx="16" cy="10.2" r="2.3" fill="url(#grad)"/>
</svg>
