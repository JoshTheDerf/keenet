appId: com.keenet.desktop
productName: KeeNet
copyright: Copyright © KeeNet

directories:
  output: release
  buildResources: build

# Only the built web app + the Electron main/preload scripts are packaged.
files:
  - dist/**
  - electron/**
  - package.json

# `electron/main.cjs` is the entry (also set as "main" in package.json).
mac:
  category: public.app-category.utilities
  target:
    - dmg

win:
  target:
    - nsis

linux:
  category: Utility
  target:
    - AppImage
