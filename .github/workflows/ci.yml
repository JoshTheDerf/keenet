name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Always install from the committed lockfile (deps are pinned exact).
      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Runs vue-tsc --noEmit first, then the production Vite build.
      - name: Build
        run: npm run build

      # Blocking gate: critical advisories in production deps.
      - name: Audit (critical)
        run: npm audit --omit=dev --audit-level=critical

      # Informational: surfaces high advisories without failing the build.
      # Known accepted findings: kdbxweb -> @xmldom/xmldom (high, upstream;
      # "fixing" would downgrade kdbxweb) and a dev-only esbuild advisory.
      - name: Audit (full report, non-blocking)
        run: npm audit --omit=dev || true
