name: Release Mobile

# Builds the Capacitor Android + iOS apps. The native projects are NOT committed
# (see .gitignore); CI regenerates them with `cap add` each run, then injects
# signing material from secrets at build time.
#
# - Push a tag `vX.Y.Z`  → builds and uploads APK/AAB + IPA as release-tagged artifacts.
# - Manual dispatch      → same build, artifacts only.
#
# Signing is OPTIONAL and gated on secrets: without them, Android produces an
# unsigned/debug APK and iOS does an unsigned compile check, so the pipeline is
# green day one and turns on signing when you add the secrets. See docs/RELEASING.md.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # attach the signed APK to the GitHub release on tag builds

concurrency:
  group: release-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    # Job-level env so the gating `if:` below can see it (step-level env is not
    # reliably available in the same step's if, and `secrets` isn't allowed in if).
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Capacitor 8's Android modules require JDK 21 (source release 21).
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets + generate Android project
        run: |
          npm run build
          npx cap add android
          npx cap sync android

      # Replace Capacitor's placeholder icons with ours (from resources/).
      - name: Generate app icons & splash
        run: |
          npx capacitor-assets generate --android \
            --iconBackgroundColor '#0f172a' --iconBackgroundColorDark '#0f172a' \
            --splashBackgroundColor '#0f172a' --splashBackgroundColorDark '#0f172a'

      - name: Decode signing keystore
        id: keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build signed release (APK + AAB)
        if: steps.keystore.outputs.signed == 'true'
        working-directory: android
        env:
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file="$PWD/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KS_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build unsigned debug APK (no keystore configured)
        if: steps.keystore.outputs.signed != 'true'
        working-directory: android
        run: ./gradlew assembleDebug

      # Flatten the APK/AAB to the artifact root (rather than nested build dirs).
      - name: Collect Android artifacts
        run: |
          mkdir -p dist-artifacts
          find android/app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) \
            -exec cp {} dist-artifacts/ \;
          ls -la dist-artifacts

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keenet-android
          if-no-files-found: warn
          path: dist-artifacts/*

      # On a tag build, also attach the signed APK to the GitHub release (created
      # in parallel by the desktop workflow) so it's a direct download. Only runs
      # for signed release builds — never attaches a debug APK.
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/') && steps.keystore.outputs.signed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apk=$(ls dist-artifacts/*.apk | head -1)
          [ -n "$apk" ] || { echo "no APK found"; exit 1; }
          dest="KeeNet_${GITHUB_REF_NAME#v}.apk"
          cp "$apk" "$dest"
          # The desktop job creates the (draft) release in parallel — wait for it
          # to appear (tauri-action publishes it near the end of its build).
          for i in $(seq 1 40); do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release upload "$GITHUB_REF_NAME" "$dest" --repo "$GITHUB_REPOSITORY" --clobber
              echo "attached $dest"; exit 0
            fi
            echo "release not ready yet, retry $i/40"; sleep 15
          done
          echo "release did not appear within timeout" >&2; exit 1

  ios:
    runs-on: macos-latest
    # Job-level env so the gating `if:` steps below can read it (see note above).
    env:
      IOS_DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
      IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets + generate iOS project
        run: |
          npm run build
          npx cap add ios
          npx cap sync ios

      # Replace Capacitor's placeholder icons with ours (from resources/).
      - name: Generate app icons & splash
        run: npx capacitor-assets generate --ios

      - name: Import signing certificate
        id: signing
        if: ${{ env.IOS_DIST_CERT_P12 != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        id: profile
        if: ${{ env.IOS_PROVISION_PROFILE_BASE64 != '' }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d \
            > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Archive & export signed IPA
        if: steps.profile.outputs.signed == 'true'
        working-directory: ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
          EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }} # app-store | ad-hoc | development
        run: |
          set -e
          if [ -f Podfile ]; then pod install --repo-update; fi
          if [ -d App.xcworkspace ]; then C="-workspace App.xcworkspace"; else C="-project App.xcodeproj"; fi
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>${EXPORT_METHOD:-app-store}</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict><key>com.thederf.keenet.app</key><string>${PROFILE_NAME}</string></dict>
          </dict></plist>
          PLIST
          xcodebuild $C -scheme App -configuration Release \
            -archivePath "$PWD/build/App.xcarchive" archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"
          xcodebuild -exportArchive -archivePath "$PWD/build/App.xcarchive" \
            -exportOptionsPlist ExportOptions.plist -exportPath "$PWD/build"

      - name: Compile-check only (no signing secrets)
        if: steps.profile.outputs.signed != 'true'
        working-directory: ios/App
        run: |
          set -e
          # CocoaPods projects build via the .xcworkspace (created by pod install);
          # SPM-based projects build via the .xcodeproj directly.
          if [ -f Podfile ]; then pod install --repo-update; fi
          if [ -d App.xcworkspace ]; then C="-workspace App.xcworkspace"; else C="-project App.xcodeproj"; fi
          xcodebuild $C -scheme App \
            -configuration Release -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO build

      - name: Upload iOS artifacts
        if: steps.profile.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: keenet-ios
          if-no-files-found: warn
          path: ios/App/build/*.ipa
